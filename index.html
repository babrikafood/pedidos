<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BabriKa | Comida Árabe</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<!-- SPLASH ANIMADO -->
<div id="splash">
  <img src="assets/logo.png" alt="BabriKa Logo">
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="main" class="hidden">

<header class="topbar">
  <div class="brand">
    <img src="assets/logo.png" alt="Logo" class="logo-small">
    <div class="brand-text">
      <div class="brand-title">BabriKa</div>
      <div class="brand-sub">Pedidos rápidos • Delivery</div>
    </div>
  </div>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Buscar...">
    <button id="btnClear" class="btn ghost">Limpiar</button>
  </div>
</header>

<main class="layout">
  <section class="content">
    <div class="hero">
      <div class="hero-text">
        <h1>Pedí rápido, ¡sin esperar!</h1>
        <p>Seleccioná tus platos, confirmá y se abre WhatsApp con tu pedido listo.</p>
      </div>
      <div class="hero-img" aria-hidden="true"></div>
    </div>

    <div class="section-head">
      <h2>Menú</h2>
      <div class="chips">
        <button class="chip active" data-filter="all">Todo</button>
        <button class="chip" data-filter="shawarma">Shawarma</button>
        <button class="chip" data-filter="falafel">Falafel</button>
        <button class="chip" data-filter="entradas">Entradas</button>
        <button class="chip" data-filter="bebidas">Bebidas</button>
      </div>
    </div>

    <div id="grid" class="grid"></div>
  </section>

  <aside class="cart">
    <div class="cart-head">
      <h3>Tu pedido</h3>
      <button id="btnEmpty" class="btn ghost">Vaciar</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-summary">
      <div class="row"><span>Subtotal</span><strong id="subtotal">$0</strong></div>
      <div class="row"><span>Envío</span><strong id="shipping">$0</strong></div>
      <div class="row total"><span>Total</span><strong id="total">$0</strong></div>
    </div>
    <div class="checkout">
      <h4>Datos de envío</h4>
      <label>Nombre<input id="cName" type="text"></label>
      <label>Dirección<input id="cAddr" type="text"></label>
      <label>Notas<textarea id="cNotes"></textarea></label>
      <label>Pago
        <select id="cPay">
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Pago móvil">Pago móvil</option>
        </select>
      </label>
      <label><input type="checkbox" id="cDelivery" checked> Delivery</label>
      <button id="btnWhatsApp" class="btn primary">Enviar por WhatsApp</button>
    </div>
  </aside>
</main>

</div>

<script>
window.APP_CONFIG = {
  whatsappNumber: "584144259594", // Cambiar por tu número
  currencySymbol: "$",
  shippingFlat: 3
};
</script>
<script src="assets/app.js"></script>
</body>
</html>
