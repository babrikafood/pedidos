<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BabriKa | Pedidos Web</title>
<link rel="stylesheet" href="assets/style.css?v=2.5">
</head>
<body>
<div id="splash" aria-hidden="true">
  <img src="assets/logo.png" alt="BabriKa Logo">
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.png" alt="Logo BabriKa" class="logo-small">
      <div>
        <h1>BabriKa</h1>
        <p>Pedido online</p>
      </div>
    </div>

    <div class="actions">
      <label class="search" for="search">
        <span aria-hidden="true">🔎</span>
        <span class="sr-only">Buscar en el menú</span>
        <input id="search" type="search" placeholder="Buscar plato o ingrediente...">
      </label>
      <button id="btnClear" class="btn ghost" type="button">Limpiar</button>
    </div>
  </header>

  <main class="layout">
    <section class="menu-panel">
      <div class="hero">
        <div>
          <h2>Arma tu pedido en segundos</h2>
          <p>Todo funciona con HTML, CSS, JS y JSON: sin PHP y sin base de datos.</p>
        </div>
        <div class="pill" id="openNow">🕒 Abierto ahora</div>
      </div>

      <div class="section-head">
        <h3>Menú</h3>
        <div id="chips" class="chips"></div>
      </div>

      <p id="resultInfo" class="result-info" aria-live="polite"></p>
      <div id="grid" class="grid"></div>
    </section>

    <aside class="cart-panel">
      <div class="cart-head">
        <h3>Tu pedido</h3>
        <button id="btnEmpty" class="btn ghost" type="button">Vaciar</button>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-summary">
        <div><span>Subtotal</span><strong id="subtotal">€0.00</strong></div>
        <div class="total"><span>Total</span><strong id="total">€0.00</strong></div>
      </div>

      <form id="checkout" class="checkout" novalidate>
        <h4>Datos del cliente</h4>
        <label>Nombre<input id="cName" type="text" required></label>
        <label>Notas<textarea id="cNotes" rows="2" placeholder="Referencia o comentario"></textarea></label>
        <label>Método de pago
          <select id="cPay">
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Pago móvil">Pago móvil</option>
          </select>
        </label>

        <button id="btnWhatsApp" class="btn primary" type="submit">Confirmar por WhatsApp</button>
      </form>
    </aside>
  </main>
</div>

<script>
window.APP_CONFIG = {
  whatsappNumber: "584144259594",
  currency: "EUR",
  splashMs: 1200,
  cartStorageKey: "cart_arabe_v3",
  customerStorageKey: "checkout_arabe_v4"
};
</script>
<script src="assets/app.js"></script>
</body>
</html>
